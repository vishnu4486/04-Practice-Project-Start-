name: deployment
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: run lint
        run: npm run lint
      
      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build
